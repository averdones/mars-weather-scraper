name: Download Weather Daily

on:
  schedule:
    - cron: "45 11 * * *"
  workflow_dispatch:  # Allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t scraper-image .

    - name: Run scrape smoke test container
      run: docker run --rm --network host --entrypoint python scraper-image scrape_smoke_test.py

    - name: Run scraper container
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: docker run --rm --network host -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY scraper-image
